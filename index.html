<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewport">
    <div id="container">
      <div id="grid"></div>
    </div>
  </div>
  <div id="lightbox-overlay" class="lightbox-overlay">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div id="lightbox-info" class="lightbox-info">
      <p id="lightbox-title" class="lightbox-title"></p>
      <a id="lightbox-link" class="lightbox-view-btn" href="#" target="_blank" rel="noopener">View on Twitter</a>
    </div>
  </div>
  <script src="node_modules/motion/dist/motion.js"></script>
  <script src="app.js"></script>
</body>
</html>
